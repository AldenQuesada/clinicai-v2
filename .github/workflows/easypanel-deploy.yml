name: Easypanel auto-deploy

# Dispara webhook do Easypanel apos push pra main · so pros apps cujos paths
# foram afetados (path filters). Funciona como fallback quando o autoDeploy
# nativo do Easypanel falha (webhook GitHub quebrado, signature invalida, etc).
#
# 2026-06-03 · BEST-EFFORT / NAO-FATAL: o host Easypanel (181.215.69.124:3000)
# responde normal de outras redes, mas o firewall do VPS BLOQUEIA os IPs dos
# runners do GitHub Actions · o curl daqui sempre da timeout (exit 28). O
# deploy REAL acontece pelo autoDeploy NATIVO do Easypanel (git push). Por
# isso este trigger virou best-effort: tenta, mas NUNCA falha o job · evita
# travar a CI com um X vermelho enganoso. Pra reativar o trigger por aqui,
# liberar os ranges de IP do GitHub Actions no firewall do VPS.
#
# CONFIGURACAO NECESSARIA · Settings -> Secrets -> Actions:
#   EASYPANEL_DEPLOY_LARA      · token da app `whatsapp` (Lara)
#   EASYPANEL_DEPLOY_MIRA      · token da app `mira`
#   EASYPANEL_DEPLOY_FLIPBOOK  · token da app `flipbook`
# Tokens em tmp/easypanel-list.json (campo `token` de cada service).
#
# TRIGGER MANUAL: Actions -> Easypanel auto-deploy -> Run workflow -> escolhe app.

on:
  push:
    branches: [main]
    paths:
      - 'apps/lara/**'
      - 'apps/mira/**'
      - 'apps/flipbook/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.json'
      - 'Dockerfile'
      - 'apps/lara/Dockerfile'
      - 'apps/mira/Dockerfile'
      - 'apps/flipbook/Dockerfile'
  workflow_dispatch:
    inputs:
      app:
        description: 'Qual app deployar manualmente'
        required: true
        type: choice
        options: [all, lara, mira, flipbook]
        default: all

jobs:
  detect:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      lara: ${{ steps.filter.outputs.lara }}
      mira: ${{ steps.filter.outputs.mira }}
      flipbook: ${{ steps.filter.outputs.flipbook }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shared:
              - 'packages/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.json'
            lara:
              - 'apps/lara/**'
            mira:
              - 'apps/mira/**'
            flipbook:
              - 'apps/flipbook/**'

  deploy-lara:
    name: Deploy Lara (whatsapp)
    needs: detect
    if: |
      github.event_name == 'workflow_dispatch' && (inputs.app == 'all' || inputs.app == 'lara') ||
      github.event_name == 'push' && (needs.detect.outputs.lara == 'true' || needs.detect.outputs.shared == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Easypanel deploy (best-effort · fallback)
        run: |
          # Best-effort · o deploy real acontece pelo autoDeploy nativo do
          # Easypanel (git). O runner do GitHub e bloqueado pelo firewall do
          # VPS, entao este curl pode dar timeout · NUNCA falha o job.
          SECRET="${{ secrets.EASYPANEL_DEPLOY_LARA }}"
          if [ -z "$SECRET" ]; then
            echo "::warning::EASYPANEL_DEPLOY_LARA ausente · pulando trigger (autoDeploy nativo cobre)"
            exit 0
          fi
          if curl -sSf -X POST -m 30 -w "\nHTTP %{http_code}\n" \
               "http://181.215.69.124:3000/api/deploy/$SECRET"; then
            echo "OK · trigger Easypanel respondeu"
          else
            echo "::warning::trigger Easypanel inacessivel do runner GitHub (firewall) · deploy real via autoDeploy nativo do Easypanel"
          fi
          exit 0

  deploy-mira:
    name: Deploy Mira
    needs: detect
    if: |
      github.event_name == 'workflow_dispatch' && (inputs.app == 'all' || inputs.app == 'mira') ||
      github.event_name == 'push' && (needs.detect.outputs.mira == 'true' || needs.detect.outputs.shared == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Easypanel deploy (best-effort · fallback)
        run: |
          # Best-effort · ver nota no topo do workflow (firewall bloqueia runner).
          SECRET="${{ secrets.EASYPANEL_DEPLOY_MIRA }}"
          if [ -z "$SECRET" ]; then
            echo "::warning::EASYPANEL_DEPLOY_MIRA ausente · pulando trigger (autoDeploy nativo cobre)"
            exit 0
          fi
          if curl -sSf -X POST -m 30 -w "\nHTTP %{http_code}\n" \
               "http://181.215.69.124:3000/api/deploy/$SECRET"; then
            echo "OK · trigger Easypanel respondeu"
          else
            echo "::warning::trigger Easypanel inacessivel do runner GitHub (firewall) · deploy real via autoDeploy nativo do Easypanel"
          fi
          exit 0

  deploy-flipbook:
    name: Deploy Flipbook
    needs: detect
    if: |
      github.event_name == 'workflow_dispatch' && (inputs.app == 'all' || inputs.app == 'flipbook') ||
      github.event_name == 'push' && (needs.detect.outputs.flipbook == 'true' || needs.detect.outputs.shared == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Easypanel deploy (best-effort · fallback)
        run: |
          # Best-effort · ver nota no topo do workflow (firewall bloqueia runner).
          SECRET="${{ secrets.EASYPANEL_DEPLOY_FLIPBOOK }}"
          if [ -z "$SECRET" ]; then
            echo "::warning::EASYPANEL_DEPLOY_FLIPBOOK ausente · pulando trigger (autoDeploy nativo cobre)"
            exit 0
          fi
          if curl -sSf -X POST -m 30 -w "\nHTTP %{http_code}\n" \
               "http://181.215.69.124:3000/api/deploy/$SECRET"; then
            echo "OK · trigger Easypanel respondeu"
          else
            echo "::warning::trigger Easypanel inacessivel do runner GitHub (firewall) · deploy real via autoDeploy nativo do Easypanel"
          fi
          exit 0
