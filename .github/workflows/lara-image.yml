name: Build & push Lara image (GHCR)

# Builda a imagem Docker da Lara NO GITHUB (RAM de sobra) e publica no GHCR.
# O VPS/Easypanel deixa de buildar (que travava o node por OOM no `next build`)
# e passa a SO PUXAR a imagem pronta · deploy em segundos, sem build no node.
#
# ── SETUP 1x · GitHub ──────────────────────────────────────────────────────
# Settings -> Secrets and variables -> Actions -> New repository secret
# (copiar os valores dos "Build Args" atuais da Lara no Easypanel · sao
#  NEXT_PUBLIC_* · embed no bundle JS em BUILD TIME):
#   NEXT_PUBLIC_SUPABASE_URL
#   NEXT_PUBLIC_SUPABASE_ANON_KEY
#   NEXT_PUBLIC_APP_URL
#   NEXT_PUBLIC_PAINEL_URL
#
# ── SETUP 1x · Easypanel ───────────────────────────────────────────────────
# Lara -> Source: trocar de "Git" para "Docker Image":
#   imagem:  ghcr.io/<owner-minusculo>/clinicai-lara:latest
#   creds:   usuario do GitHub + PAT (classic) com escopo `read:packages`
# Os env vars de RUNTIME (service role, secrets, etc.) continuam no Easypanel
# (nao vao pra imagem). So os 4 NEXT_PUBLIC_* viram build-args aqui.

on:
  push:
    branches: [main]
    paths:
      - 'apps/lara/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.json'
      - 'apps/lara/Dockerfile'
      - '.github/workflows/lara-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: Build & push (GHCR)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Owner em minusculo (GHCR exige lowercase)
        id: meta
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Checa build-args obrigatorios (fail-fast · nao publica imagem quebrada)
        env:
          U: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          K: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          A: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          P: ${{ secrets.NEXT_PUBLIC_PAINEL_URL }}
        run: |
          missing=""
          [ -z "$U" ] && missing="$missing NEXT_PUBLIC_SUPABASE_URL"
          [ -z "$K" ] && missing="$missing NEXT_PUBLIC_SUPABASE_ANON_KEY"
          [ -z "$A" ] && missing="$missing NEXT_PUBLIC_APP_URL"
          [ -z "$P" ] && missing="$missing NEXT_PUBLIC_PAINEL_URL"
          if [ -n "$missing" ]; then
            echo "::error::Faltam secrets do repo (Settings -> Secrets -> Actions):$missing"
            echo "Sem eles o browser client recebe undefined e a UI quebra. Adicione e re-rode."
            exit 1
          fi
          echo "build-args presentes · ok"

      - uses: docker/setup-buildx-action@v3

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push imagem
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/lara/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/clinicai-lara:latest
            ghcr.io/${{ steps.meta.outputs.owner }}/clinicai-lara:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_PAINEL_URL=${{ secrets.NEXT_PUBLIC_PAINEL_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resumo
        run: |
          IMG="ghcr.io/${{ steps.meta.outputs.owner }}/clinicai-lara:latest"
          {
            echo "### Imagem publicada"
            echo ""
            echo "\`$IMG\`"
            echo ""
            echo "No Easypanel: **Lara -> Source -> Docker Image** -> cole a tag acima -> **Deploy** (so puxa, nao builda)."
          } >> "$GITHUB_STEP_SUMMARY"
