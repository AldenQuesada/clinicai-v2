# GitHub Actions cron · jobs proativos da Lara.
#
# Mesmo padrão do mira-crons.yml: cron declarado aqui, dispatch via curl
# com header x-cron-secret. Audit fix N3 (2026-04-27 · branch
# audit/blindagem-lara-2026-04-27).
#
# Setup necessário:
#   GitHub repo → Settings → Secrets and variables → Actions → New repo secret
#     · CRON_SECRET = <mesmo valor da env CRON_SECRET no Easypanel>
#
# Gerar segredo: openssl rand -hex 32

name: Lara proactive crons

on:
  schedule:
    # /api/cron/reactivate · DESABILITADO 2026-05-06 (audit Mih ghost Lara)
    # Razão: cron disparava msg "Você acabou se ocupando por aí..." em convs
    # da Mih/Secretaria · contaminava /secretaria com sender='lara'. Endpoint
    # virou no-op no commit dessa data. Re-habilitar só após decisão sobre
    # filtro per-channel (Cloud Lara vs Mih) ser implementada.
    # - cron: '15 * * * *'
    # /api/cron/orcamento-followup · 1x/dia 13h UTC = 10h SP · Camada 10a
    - cron: '0 13 * * *'
    # /api/cron/divergence-check · 1x/dia 09h30 UTC = 06h30 SP · Camada 12c
    # Soak window 2026-04-28 → 2026-05-28 · valida legacy vs v2 nas 4 tabelas
    - cron: '30 9 * * *'
    # /api/cron/lid-pending-monitor · 1x/dia 10h30 UTC = 07h30 BRT · Step 11F
    # Read-only health check do pipeline @lid (Evolution Baileys) · zero side
    # effect · usa RPC wa_lid_silent_loss_count (11E.1). Window=24h.
    - cron: '30 10 * * *'
    # /api/cron/lid-pending-reprocess · 1x/dia 11h00 UTC = 08h00 BRT · Step 11G
    # POST com gate: chama o monitor antes; só drena se pending_total>0 e
    # verdict != fail_silent_loss_detected. Body: dry_run=false limit=10.
    # Auth: WA_LID_REPROCESS_SECRET dedicado (segrega blast radius do read-only).
    - cron: '0 11 * * *'
  # Permite trigger manual via UI
  workflow_dispatch:
    inputs:
      job:
        description: 'Qual cron disparar manualmente'
        required: true
        type: choice
        options:
          # reactivate desabilitado 2026-05-06 · endpoint é no-op
          - orcamento-followup
          - divergence-check
          - lid-pending-monitor
          - lid-pending-reprocess

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Resolve which cron to fire
        id: route
        run: |
          set -e
          KIND=simple
          ENDPOINTS=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            case "${{ github.event.inputs.job }}" in
              lid-pending-monitor) ENDPOINTS="lid-pending-monitor?window_hours=24" ;;
              lid-pending-reprocess) KIND=reprocess ;;
              *) ENDPOINTS="${{ github.event.inputs.job }}" ;;
            esac
          else
            case "${{ github.event.schedule }}" in
              # "15 * * * *") ENDPOINTS="reactivate" ;;  # desabilitado 2026-05-06
              "0 13 * * *") ENDPOINTS="orcamento-followup" ;;
              "30 9 * * *") ENDPOINTS="divergence-check" ;;
              "30 10 * * *") ENDPOINTS="lid-pending-monitor?window_hours=24" ;;
              "0 11 * * *") KIND=reprocess ;;
              *) echo "schedule desconhecido: ${{ github.event.schedule }}" && exit 1 ;;
            esac
          fi
          echo "kind=$KIND" >> "$GITHUB_OUTPUT"
          echo "endpoints=$ENDPOINTS" >> "$GITHUB_OUTPUT"
          echo "Disparando: kind=$KIND endpoints=$ENDPOINTS"

      - name: Fire crons
        if: steps.route.outputs.kind != 'reprocess'
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -e
          BASE="https://lara.miriandpaula.com.br"
          for ep in ${{ steps.route.outputs.endpoints }}; do
            echo "→ $ep"
            HTTP_CODE=$(curl -fsS -o /tmp/resp.json -w "%{http_code}" \
              -H "x-cron-secret: $CRON_SECRET" \
              -m 60 \
              "$BASE/api/cron/$ep" || echo "000")
            echo "  status=$HTTP_CODE"
            if [ -f /tmp/resp.json ]; then
              echo "  resp=$(cat /tmp/resp.json | head -c 300)"
            fi
            if [ "$HTTP_CODE" != "200" ]; then
              echo "::warning::$ep retornou $HTTP_CODE"
            fi
          done

      - name: Reprocess @lid pending with monitor gate
        if: steps.route.outputs.kind == 'reprocess'
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          WA_LID_REPROCESS_SECRET: ${{ secrets.WA_LID_REPROCESS_SECRET }}
        run: |
          set -e
          BASE="https://lara.miriandpaula.com.br"

          # ── 1. Monitor gate ──────────────────────────────────────────
          # Read-only · usa CRON_SECRET (mesmo dos demais crons read-only).
          echo "→ gate · GET /api/cron/lid-pending-monitor?window_hours=24"
          MONITOR_BODY=$(curl -fsS \
            -H "x-cron-secret: $CRON_SECRET" \
            -m 60 \
            "$BASE/api/cron/lid-pending-monitor?window_hours=24")
          echo "  monitor_resp=$(echo "$MONITOR_BODY" | head -c 400)"

          VERDICT=$(echo "$MONITOR_BODY" | jq -r '.verdict // "unknown"')
          PENDING_TOTAL=$(echo "$MONITOR_BODY" | jq -r '.pending_total // 0')
          SILENT_LOSS=$(echo "$MONITOR_BODY" | jq -r '.silent_loss_candidates_24h // 0')
          echo "  verdict=$VERDICT pending_total=$PENDING_TOTAL silent_loss=$SILENT_LOSS"

          # Gate A: silent loss → ABORT (não drenar enquanto há perda real).
          if [ "$VERDICT" = "fail_silent_loss_detected" ]; then
            echo "::error::silent loss detected (count=$SILENT_LOSS) · NÃO drenando · investigar antes"
            exit 1
          fi

          # Gate B: outros fail_* → ABORT (estado degradado · não amplificar).
          case "$VERDICT" in
            fail_*)
              echo "::error::monitor verdict=$VERDICT · NÃO drenando · investigar"
              exit 1
              ;;
          esac

          # Gate C: pending_total=0 → success sem chamar drain.
          if [ "$PENDING_TOTAL" = "0" ]; then
            echo "✓ pending_total=0 · nada pra drenar · success"
            exit 0
          fi

          # ── 2. Reprocessador ─────────────────────────────────────────
          # POST · usa WA_LID_REPROCESS_SECRET dedicado (segrega blast radius).
          # dry_run=false explícito · limit=10 (clamp [1,50] · default 20 do endpoint).
          echo "→ POST /api/cron/lid-pending-reprocess (dry_run=false limit=10)"
          REPROC_HTTP=$(curl -fsS -o /tmp/reproc.json -w "%{http_code}" \
            -X POST \
            -H "x-cron-secret: $WA_LID_REPROCESS_SECRET" \
            -H "Content-Type: application/json" \
            -d '{"dry_run":false,"limit":10}' \
            -m 120 \
            "$BASE/api/cron/lid-pending-reprocess" || echo "000")
          echo "  status=$REPROC_HTTP"
          if [ -f /tmp/reproc.json ]; then
            echo "  resp=$(cat /tmp/reproc.json | head -c 600)"
          fi
          if [ "$REPROC_HTTP" != "200" ]; then
            echo "::error::reprocessor retornou $REPROC_HTTP"
            exit 1
          fi
